<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaxAI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Consolas', monospace;
    color: #eee;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 6px;
    color: #e94560;
    text-shadow: 0 0 20px #e9456066;
  }
  #subtitle { font-size: 0.75rem; color: #666; margin-bottom: 14px; letter-spacing: 2px; }
  #canvas-wrap {
    position: relative;
    border: 2px solid #e94560;
    box-shadow: 0 0 40px #e9456033;
    border-radius: 4px;
    overflow: hidden;
  }
  canvas { display: block; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    font-size: 1.3rem;
    text-align: center;
    line-height: 2.4;
  }
  #overlay button {
    margin-top: 14px; padding: 10px 32px;
    font-family: monospace; font-size: 1rem;
    background: #e94560; color: white;
    border: none; border-radius: 4px;
    cursor: pointer; letter-spacing: 2px;
  }
  #overlay button:hover { background: #c73050; }
  #loading-bar-wrap { width: 280px; height: 5px; background: #333; border-radius: 3px; margin-top: 14px; }
  #loading-bar { height: 100%; width: 0%; background: #e94560; transition: width 0.3s; border-radius: 3px; }
  #controls { margin-top: 8px; font-size: 0.68rem; color: #555; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>HaxAI</h1>
<div id="subtitle">YOU vs THE MACHINE</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="overlay-msg">Loading AI brain...</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>
</div>
<div id="controls">W/A/S/D: move &nbsp;|&nbsp; SPACE: kick &nbsp;|&nbsp; R: reset &nbsp;|&nbsp; +/−: speed</div>

<script>
// =============================================================================
// ⚙️  TUNING CONSTANTS — edit these to adjust feel
//     Mirror of: config.py
// =============================================================================
const CFG = {
  FIELD_W:  368,  // config.FIELD_WIDTH
  FIELD_H:  171,  // config.FIELD_HEIGHT
  GOAL_H:    63,  // config.GOAL_HALF_HEIGHT
  MAP_W:    420,  // config.MAP_WIDTH
  MAP_H:    200,  // config.MAP_HEIGHT
  P_RADIUS:  15,  // config.PLAYER_RADIUS
  P_INV_MASS: 0.5, // config.PLAYER_INV_MASS
  P_DAMPING: 0.96, // config.PLAYER_DAMPING
  P_ACCEL:  0.11, // config.PLAYER_ACCEL
  B_RADIUS: 5.5,  // config.BALL_RADIUS
  B_INV_MASS: 0.7, // config.BALL_INV_MASS
  B_DAMPING: 0.986,// config.BALL_DAMPING
  B_BOUNCE:  0.2, // config.BALL_BOUNCE
  KICK_STR:  6.5, // config.KICK_STRENGTH
  KICK_OFF:  10,  // config.KICK_RADIUS_OFFSET
  MAX_VEL:   15.0, // used in observation normalisation
  MAX_STEPS: 1500, // match play.py MAX_STEPS
};

// ==================== HARD-CODED PLAYER NAMES ====================
const PLAYER_NAMES = {
  human: 'YOU',
  ai:    'SP_V7',
};

// Render scale — increase for bigger canvas, decrease for smaller screens
const SCALE = 1.6;

// AI inference cadence — matches play.py: `if frame_count % 4 == 0`
// 4 = AI decides every 4 frames (runs at 15Hz decision rate, physics at 60Hz)
const AI_INFERENCE_EVERY = 4;

// Game speed: 1.0 = normal. 0.5 = half speed (matches your local play.py feel).
// Press +/- in game to adjust live without reloading.
let GAME_SPEED = 0.5;

// =============================================================================
// CANVAS SETUP
// =============================================================================
const canvas = document.getElementById('c');
const W = CFG.MAP_W * 2 * SCALE;
const H = CFG.MAP_H * 2 * SCALE;
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// Convert game coords → canvas pixels
// Mirror of: play.py  px(x, y) = (int(x + config.MAP_WIDTH), int(y + config.MAP_HEIGHT))
function px(x, y) {
  return [(x + CFG.MAP_W) * SCALE, (y + CFG.MAP_H) * SCALE];
}

// =============================================================================
// PHYSICS ENGINE
// Mirror of: engine.py, entities.py, physics.py, world.py
// =============================================================================

// --- Entity (mirror of entities.py Disc) ---
class Entity {
  constructor(x, y, radius, invMass, damping, bCoef) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.radius  = radius;
    this.invMass = invMass;
    this.damping = damping;
    this.bCoef   = bCoef;
  }
  // Mirror of: entities.py Disc.move()
  move() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= this.damping; this.vy *= this.damping;
  }
}

// --- Player (mirror of entities.py Player) ---
class Player extends Entity {
  constructor(x, y) {
    super(x, y, CFG.P_RADIUS, CFG.P_INV_MASS, CFG.P_DAMPING, 0.5);
    this.canKick          = false;
    this.pressingKick     = false;
    this.hasKickedThisPress = false;
  }
  // Mirror of: entities.py Player.apply_input()
  applyInput(up, down, left, right, kick) {
    let ax = 0, ay = 0;
    if (left)  ax -= CFG.P_ACCEL;
    if (right) ax += CFG.P_ACCEL;
    if (up)    ay -= CFG.P_ACCEL;
    if (down)  ay += CFG.P_ACCEL;
    const len = Math.sqrt(ax*ax + ay*ay);
    if (len > CFG.P_ACCEL) { ax = ax/len*CFG.P_ACCEL; ay = ay/len*CFG.P_ACCEL; }
    this.vx += ax; this.vy += ay;
    if (kick && !this.pressingKick) this.hasKickedThisPress = false;
    this.pressingKick = kick;
    this.canKick = kick && !this.hasKickedThisPress;
  }
}

// Mirror of: entities.py Ball
class Ball extends Entity {
  constructor() {
    super(0, 0, CFG.B_RADIUS, CFG.B_INV_MASS, CFG.B_DAMPING, CFG.B_BOUNCE);
  }
}

// Mirror of: physics.py resolve_collision_disc_disc()
function resolveCollision(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const combined = a.radius + b.radius;
  if (dist >= combined || dist < 0.0001) return;
  const nx = dx/dist, ny = dy/dist;
  const pen = combined - dist;
  const tim = a.invMass + b.invMass;
  a.x += nx * pen * a.invMass / tim;
  a.y += ny * pen * a.invMass / tim;
  b.x -= nx * pen * b.invMass / tim;
  b.y -= ny * pen * b.invMass / tim;
  const rvx = a.vx - b.vx, rvy = a.vy - b.vy;
  const vn = rvx*nx + rvy*ny;
  if (vn > 0) return;
  const e = (a.bCoef + b.bCoef) / 2;
  const j = -(1+e)*vn / tim;
  a.vx += nx*j*a.invMass; a.vy += ny*j*a.invMass;
  b.vx -= nx*j*b.invMass; b.vy -= ny*j*b.invMass;
}

// Mirror of: physics.py check_kick()
function checkKick(player, ball) {
  if (!player.canKick) return;
  const dx = ball.x - player.x, dy = ball.y - player.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < player.radius + ball.radius + CFG.KICK_OFF) {
    const len = dist || 1;
    ball.vx += (dx/len) * CFG.KICK_STR;
    ball.vy += (dy/len) * CFG.KICK_STR;
    player.hasKickedThisPress = true;
  }
}

// Mirror of: world.py apply_boundaries() — players use MAP bounds
function applyBoundaries(e) {
  if (e.x + e.radius >  CFG.MAP_W) { e.x =  CFG.MAP_W - e.radius; e.vx *= -0.5; }
  if (e.x - e.radius < -CFG.MAP_W) { e.x = -CFG.MAP_W + e.radius; e.vx *= -0.5; }
  if (e.y + e.radius >  CFG.MAP_H) { e.y =  CFG.MAP_H - e.radius; e.vy *= -0.5; }
  if (e.y - e.radius < -CFG.MAP_H) { e.y = -CFG.MAP_H + e.radius; e.vy *= -0.5; }
}

// Mirror of: engine.py GameEngine._handle_ball_bounds()
function handleBallBounds(ball) {
  if (ball.y + ball.radius >  CFG.FIELD_H) { ball.y =  CFG.FIELD_H - ball.radius; ball.vy *= -0.5; }
  if (ball.y - ball.radius < -CFG.FIELD_H) { ball.y = -CFG.FIELD_H + ball.radius; ball.vy *= -0.5; }
  if (Math.abs(ball.y) > CFG.GOAL_H) {
    if (ball.x + ball.radius >  CFG.FIELD_W) { ball.x =  CFG.FIELD_W - ball.radius; ball.vx *= -0.5; }
    if (ball.x - ball.radius < -CFG.FIELD_W) { ball.x = -CFG.FIELD_W + ball.radius; ball.vx *= -0.5; }
  }
}

// Mirror of: world.py check_goal()
// Returns: 1 = p1 scored (ball in right goal), -1 = p2 scored (ball in left goal), 0 = no goal
function checkGoal(ball) {
  if (Math.abs(ball.y) < CFG.GOAL_H) {
    if (ball.x >  CFG.FIELD_W) return  1;
    if (ball.x < -CFG.FIELD_W) return -1;
  }
  return 0;
}

// Full physics tick — mirror of engine.py GameEngine.step()
// NOTE: called once per render frame (not 4x). This matches play.py's single game.step() call.
function physicsStep(p1Actions, p2Actions) {
  // 1. Apply inputs
  p1.applyInput(...p1Actions);
  p2.applyInput(...p2Actions);
  // 2. Kick
  checkKick(p1, ball);
  checkKick(p2, ball);
  // 3. Move
  p1.move(); p2.move(); ball.move();
  // 4. Collisions
  resolveCollision(p1, ball);
  resolveCollision(p2, ball);
  resolveCollision(p1, p2);
  // 5. Boundaries
  applyBoundaries(p1);
  applyBoundaries(p2);
  handleBallBounds(ball);
  // 6. Goal check
  return checkGoal(ball);
}

// =============================================================================
// NEURAL NETWORK INFERENCE
// Mirror of: extract_weights.py + selfplay_env._get_obs()
// PPO policy: obs(13) → tanh(W0·obs+B0) → tanh(W1·h+B1) → W2·h+B2 → logits(8)
// =============================================================================

// Weights — populated after weights.json loads
let W0, B0, W1, B1, W2, B2;

// Forward pass — pure JS matrix math, no libraries
// Mirror of: numpy  h = tanh(W @ x + b)
function matVec(W, v) { return W.map(row => row.reduce((s, w, i) => s + w * v[i], 0)); }
function addBias(v, b) { return v.map((x, i) => x + b[i]); }
function tanhVec(v)    { return v.map(x => Math.tanh(x)); }
function argmax(arr)   { return arr.reduce((bi, v, i, a) => v > a[bi] ? i : bi, 0); }

function policyInfer(obs) {
  let h = tanhVec(addBias(matVec(W0, obs), B0));  // layer 1
      h = tanhVec(addBias(matVec(W1, h),  B1));  // layer 2
  const logits = addBias(matVec(W2, h), B2);       // action head
  // MultiDiscrete([3, 3, 2]) — argmax within each segment
  // Mirrors: SB3 deterministic predict() with MultiDiscrete action space
  return [
    argmax(logits.slice(0, 3)),  // x movement:  0=left 1=none 2=right
    argmax(logits.slice(3, 6)),  // y movement:  0=up   1=none 2=down
    argmax(logits.slice(6, 8)),  // kick:         0=no   1=yes
  ];
}

// =============================================================================
// OBSERVATION BUILDER
// Mirror of: selfplay_env.py SelfPlayEnv._get_obs(is_p1)
// 13 values, all normalised to [-1, 1]
// =============================================================================
function getObs(isP1) {
  const p   = isP1 ? p1 : p2;
  const opp = isP1 ? p2 : p1;
  const dm  = isP1 ? 1 : -1;               // dir_mult — p2 flips L/R
  const gx  = CFG.FIELD_W * dm;            // target goal x from this agent's POV
  const MV  = CFG.MAX_VEL;
  const FW2 = CFG.FIELD_W * 2;
  const FH2 = CFG.FIELD_H * 2;
  function nc(v, m) { return Math.max(-1, Math.min(1, v / m)); }
  return [
    nc(p.vx * dm,              MV),   // 0  p_vx
    nc(p.vy,                   MV),   // 1  p_vy
    nc((ball.x - p.x) * dm,   FW2),  // 2  rel_ball_dx
    nc((ball.y - p.y),         FH2),  // 3  rel_ball_dy
    nc(ball.vx * dm,           MV),   // 4  b_vx
    nc(ball.vy,                MV),   // 5  b_vy
    nc((gx - p.x) * dm,        FW2),  // 6  rel_goal_dx
    nc((0 - p.y),              FH2),  // 7  rel_goal_dy
    p.canKick ? 1.0 : -1.0,           // 8  can_kick
    nc((opp.x - p.x) * dm,    FW2),  // 9  rel_opp_x
    nc((opp.y - p.y),          FH2),  // 10 rel_opp_y
    nc(opp.vx * dm,            MV),   // 11 opp_vx
    nc(opp.vy,                 MV),   // 12 opp_vy
  ];
}

// Convert AI action array → applyInput() booleans
// p2 has left/right swapped because dir_mult=-1 in its observation
// Mirror of: play.py ai_action_to_engine(action, is_p1=False)
function aiActToInput(act) {
  const [ax, ay, ak] = act;
  return [
    ay === 0,  // up
    ay === 2,  // down
    ax === 2,  // left  ← SWAPPED for p2
    ax === 0,  // right ← SWAPPED for p2
    ak === 1,  // kick
  ];
}

// =============================================================================
// GAME STATE
// =============================================================================
let p1, p2, ball;
let scoreHuman = 0, scoreAI = 0;
let step = 0;
let flashMsg = '', flashTimer = 0;
let lastAiAct = [1, 1, 0];   // default: do nothing (centre of each MultiDiscrete)
let frameCount = 0;

function resetGame() {
  // Mirror of: engine.py GameEngine.reset()
  p1   = new Player(-180, 0);
  p2   = new Player( 180, 0);
  ball = new Ball();
  step      = 0;
  frameCount = 0;
  flashMsg  = '';
  flashTimer = 0;
}

// =============================================================================
// INPUT
// Mirror of: play.py keyboard handling — WASD + Space
// =============================================================================
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR') resetGame();
  if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    GAME_SPEED = Math.min(2.0, parseFloat((GAME_SPEED + 0.1).toFixed(1)));
    console.log('Speed:', GAME_SPEED);
  }
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    GAME_SPEED = Math.max(0.1, parseFloat((GAME_SPEED - 0.1).toFixed(1)));
    console.log('Speed:', GAME_SPEED);
  }
  if (['KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// =============================================================================
// RENDERING
// Mirror of: play.py draw section
// =============================================================================
function drawField() {
  ctx.fillStyle = '#226622';
  ctx.fillRect(0, 0, W, H);

  // Field outline
  const [fx, fy] = px(-CFG.FIELD_W, -CFG.FIELD_H);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(fx, fy, CFG.FIELD_W * 2 * SCALE, CFG.FIELD_H * 2 * SCALE);

  // Centre line
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const [cl0x, cl0y] = px(0, -CFG.FIELD_H);
  const [cl1x, cl1y] = px(0,  CFG.FIELD_H);
  ctx.moveTo(cl0x, cl0y); ctx.lineTo(cl1x, cl1y); ctx.stroke();

  // Centre circle
  const [ccx, ccy] = px(0, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(ccx, ccy, 50 * SCALE, 0, Math.PI*2); ctx.stroke();

  // Left goal (human's — mirror of play.py left_col logic)
  drawGoal(true);
  drawGoal(false);
}

function drawGoal(isLeft) {
  const gx    = isLeft ? -CFG.FIELD_W : CFG.FIELD_W;
  const col   = '#888';
  const gw    = 14 * SCALE;
  const gh    = CFG.GOAL_H * 2 * SCALE;
  const [x, y] = isLeft
    ? px(gx - 14, -CFG.GOAL_H)
    : px(gx,      -CFG.GOAL_H);
  ctx.fillStyle = col;
  ctx.fillRect(x, y, gw, gh);
}

function drawBall() {
  const [bx, by] = px(ball.x, ball.y);
  const r = ball.radius * SCALE;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
}

function drawPlayer(player, col, label) {
  const [px2, py2] = px(player.x, player.y);
  const r = player.radius * SCALE;
  if (player.canKick) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px2, py2, r + 4, 0, Math.PI*2); ctx.stroke();
  }
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(px2, py2, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(9 * SCALE)}px Consolas`;
  ctx.textAlign = 'center';
  ctx.fillText(label, px2, py2 - r - 4);
}

function drawHUD() {
  // Scoreboard background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  const sbW = 160 * SCALE, sbH = 34 * SCALE;
  ctx.fillRect(W/2 - sbW/2, 5, sbW, sbH);

  // Score numbers
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(15*SCALE)}px Consolas`;
  ctx.textAlign = 'center';
  ctx.fillText(`${scoreHuman}  —  ${scoreAI}`, W/2, 22 * SCALE);

  // YOU — AI labels
  ctx.font = `${Math.round(7.5*SCALE)}px Consolas`;
  ctx.fillStyle = '#aaa';
  ctx.fillText(`${PLAYER_NAMES.human}  —  ${PLAYER_NAMES.ai}`, W/2, 33 * SCALE);

  // Speed indicator (top right)
  ctx.font = `${Math.round(7*SCALE)}px Consolas`;
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  ctx.fillText(`speed: ${GAME_SPEED.toFixed(1)}×`, W - 8, 16 * SCALE);

  // Time progress bar
  ctx.fillStyle = '#333';
  ctx.fillRect(0, H - 4*SCALE, W, 4*SCALE);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(0, H - 4*SCALE, W * (step / CFG.MAX_STEPS), 4*SCALE);

  // Controls hint
  ctx.font = `${Math.round(6.5*SCALE)}px Consolas`;
  ctx.fillStyle = '#444';
  ctx.textAlign = 'left';
  ctx.fillText('WASD: move  |  Space: kick  |  R: reset  |  +/−: speed', 8, H - 6*SCALE);

  // Flash overlay (goal message)
  if (flashTimer > 0 && flashMsg) {
    const alpha = Math.min(1, flashTimer / 25);
    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.65})`;
    const mw = 260 * SCALE, mh = 44 * SCALE;
    ctx.fillRect(W/2 - mw/2, H/2 - mh/2, mw, mh);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = `bold ${Math.round(16*SCALE)}px Consolas`;
    ctx.textAlign = 'center';
    ctx.fillText(flashMsg, W/2, H/2 + 6*SCALE);
    flashTimer--;
  }
}

// =============================================================================
// GAME LOOP
// Fixed-timestep loop with GAME_SPEED scaling.
// Mirror of: play.py  clock.tick(60)  and  frame_count % 4 == 0
// =============================================================================
let accumulator  = 0;
let lastTimestamp = null;
const FIXED_MS = 1000 / 60;  // 60Hz physics, same as Python FPS=60

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  if (!gameRunning) return;

  if (lastTimestamp === null) { lastTimestamp = ts; return; }
  let elapsed = ts - lastTimestamp;
  lastTimestamp = ts;

  // Cap elapsed to prevent spiral of death after tab switch
  if (elapsed > 100) elapsed = 100;

  // Scale elapsed time by GAME_SPEED
  // GAME_SPEED=1.0 → normal speed, 0.5 → half speed (matches your local feel)
  accumulator += elapsed * GAME_SPEED;

  while (accumulator >= FIXED_MS) {
    accumulator -= FIXED_MS;
    tick();
  }

  // Render once per animation frame regardless of physics ticks
  drawField();
  drawPlayer(p1, '#dc3c3c', PLAYER_NAMES.human);
  drawPlayer(p2, '#3c50dc', PLAYER_NAMES.ai);
  drawBall();
  drawHUD();
}

function tick() {
  // --- Human input (WASD + Space) ---
  // Mirror of: play.py  up = keys[pygame.K_w] etc.
  const humanActions = [
    !!keys['KeyW'],      // up
    !!keys['KeyS'],      // down
    !!keys['KeyA'],      // left
    !!keys['KeyD'],      // right
    !!keys['Space'],     // kick
  ];

  // --- AI inference every 4 frames ---
  // Mirror of: play.py  if frame_count % 4 == 0: ai_act = model.predict(obs)
  if (frameCount % AI_INFERENCE_EVERY === 0) {
    const obs  = getObs(false);           // AI is p2, isP1=false
    lastAiAct  = policyInfer(obs);
  }
  const aiActions = aiActToInput(lastAiAct);

  // --- Physics step (1x per tick, same as play.py) ---
  // Mirror of: play.py  goal_status, _ = game.step(p1_actions, p2_actions)
  const goalStatus = physicsStep(humanActions, aiActions);

  frameCount++;
  step++;

  // --- Goal handling ---
  // Mirror of: play.py goal handling block
  // checkGoal returns 1 = p1 scored (right goal), -1 = p2 scored (left goal)
  // Human is p1 (red, left side), AI is p2 (blue, right side)
  if (goalStatus === 1) {
    // p1 scored → human scored
    scoreHuman++;
    flashMsg   = '⚽  YOUR GOAL!';
    flashTimer = 90;
    resetGame();
  } else if (goalStatus === -1) {
    // p2 scored → AI scored
    scoreAI++;
    flashMsg   = '💀  AI SCORED';
    flashTimer = 90;
    resetGame();
  } else if (step >= CFG.MAX_STEPS) {
    flashMsg   = '⏱  DRAW';
    flashTimer = 60;
    resetGame();
  }
}

// =============================================================================
// STARTUP — fetch weights.json then begin
// =============================================================================
let gameRunning = false;

async function init() {
  const overlay = document.getElementById('overlay');
  const msg     = document.getElementById('overlay-msg');
  const bar     = document.getElementById('loading-bar');

  msg.textContent = 'Loading AI weights...';
  bar.style.width = '15%';

  try {
    const res = await fetch('weights.json');
    if (!res.ok) throw new Error(`weights.json not found — HTTP ${res.status}`);
    bar.style.width = '60%';

    const w = await res.json();
    // Assign weight matrices — these match extract_weights.py output keys
    W0 = w.w0; B0 = w.b0;  // layer 1:  [128 × 13],  [128]
    W1 = w.w1; B1 = w.b1;  // layer 2:  [128 × 128], [128]
    W2 = w.w2; B2 = w.b2;  // action:   [8   × 128], [8]

    bar.style.width = '100%';
    msg.textContent = '✅  Ready!';

    await new Promise(r => setTimeout(r, 400));
    overlay.style.display = 'none';

    resetGame();
    gameRunning = true;
    requestAnimationFrame(gameLoop);

  } catch (err) {
    msg.innerHTML = `
      ❌ Could not load <code>weights.json</code><br>
      <small style="color:#888">${err.message}</small><br>
      <small style="color:#555">Place weights.json next to index.html and serve via HTTP</small>
    `;
    document.getElementById('loading-bar-wrap').style.display = 'none';
  }
}

init();
</script>
</body>
</html>
